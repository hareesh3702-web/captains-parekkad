<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Captains Parakked</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Poppins,sans-serif;
background:url("viking.jpg") center center/cover no-repeat fixed;
height:100vh;
overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

}

body::before{

content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,.72);

}

.container{

position:relative;
z-index:5;
text-align:center;
animation:fade 2s;

}

h1{

font-family:Cinzel;
font-size:70px;
color:white;

animation:glow 3s infinite;

}

.subtitle{

font-size:24px;
margin-top:10px;
color:#ddd;

}

.line{

width:220px;
height:3px;

background:linear-gradient(to right,cyan,#00ff99,#00bfff);

margin:25px auto;

border-radius:20px;

}

.members{

display:flex;
justify-content:center;
flex-wrap:wrap;
gap:25px;

margin-top:30px;

}

.member{

width:220px;

padding:20px;

cursor:pointer;

border-radius:20px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(8px);

border:2px solid rgba(255,255,255,.2);

color:white;

font-size:24px;

font-weight:bold;

transition:.5s;

box-shadow:0 0 20px rgba(0,255,255,.2);

position:relative;

overflow:hidden;

}

.member:hover{

transform:translateY(-10px) scale(1.08);

background:linear-gradient(135deg,#00c6ff,#0072ff);

box-shadow:0 0 30px cyan;

}

.member::before{

content:'';

position:absolute;

left:-100%;
top:0;

width:100%;
height:100%;

background:rgba(255,255,255,.15);

transform:skewX(-25deg);

transition:.5s;

}

.member:hover::before{

left:120%;

}

.role{

margin-top:15px;

font-size:20px;

opacity:0;

transition:.5s;

font-weight:600;

}

.particles{

position:absolute;
width:100%;
height:100%;
overflow:hidden;
z-index:1;

}

.particles span{

position:absolute;
display:block;

width:5px;
height:5px;

background:white;

border-radius:50%;

animation:float 15s linear infinite;

opacity:.5;

}

@keyframes float{

0%{
transform:translateY(100vh);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

@keyframes glow{

0%{
text-shadow:0 0 10px cyan;
}

50%{
text-shadow:0 0 35px cyan;
}

100%{
text-shadow:0 0 10px cyan;
}

}

@keyframes fade{

from{

opacity:0;
transform:translateY(50px);

}

to{

opacity:1;
transform:translateY(0);

}

}

@media(max-width:768px){

h1{

font-size:42px;

}

.member{

width:90%;

}

}

</style>

</head>

<body>

<div class="particles">

<span style="left:5%;animation-delay:1s"></span>
<span style="left:15%;animation-delay:4s"></span>
<span style="left:25%;animation-delay:2s"></span>
<span style="left:35%;animation-delay:8s"></span>
<span style="left:45%;animation-delay:5s"></span>
<span style="left:55%;animation-delay:3s"></span>
<span style="left:65%;animation-delay:7s"></span>
<span style="left:75%;animation-delay:6s"></span>
<span style="left:85%;animation-delay:9s"></span>
<span style="left:95%;animation-delay:2s"></span>

</div>

<div class="container">

<h1>⚔ Captains Parakked ⚔</h1>

<p class="subtitle">
Established on 2018
</p>

<div class="line"></div>

<div class="members">

<div class="member" onclick="showRole(this,'Secretary')">

Hareesh

<div class="role"></div>

</div>

<div class="member" onclick="showRole(this,'Property Owner')">

Manesh

<div class="role"></div>

</div>

<div class="member" onclick="showRole(this,'President')">

Shiyadh

<div class="role"></div>

</div>

<div class="member" onclick="showRole(this,'Treasurer')">

Ajeesh

<div class="role"></div>

</div>

</div>

</div>

<script>

const colors=[

"#00FFFF",
"#00FF7F",
"#FFD700",
"#FF69B4",
"#FF4500",
"#ADFF2F",
"#1E90FF",
"#FF1493"

];

function showRole(card,role){

document.querySelectorAll(".role").forEach(function(r){

r.style.opacity=0;
r.innerHTML="";

});

let c=colors[Math.floor(Math.random()*colors.length)];

let r=card.querySelector(".role");

r.innerHTML="★ "+role+" ★";

r.style.color=c;

r.style.opacity=1;

card.animate([

{transform:"scale(1)"},

{transform:"scale(1.15) rotate(3deg)"},

{transform:"scale(1)"}

],{

duration:600

});

}

</script>

</body>
</html>
