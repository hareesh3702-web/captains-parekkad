<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Captains Parekkad</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Poppins,sans-serif;background:url('vikings.jpg') center/cover fixed;min-height:100vh;color:#fff;padding:40px}
body:before{content:'';position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:-1}
.container{max-width:1200px;margin:auto;text-align:center}
h1{font-family:Cinzel;font-size:60px;text-shadow:0 0 20px cyan}
.subtitle{font-size:24px;margin:10px 0 25px}
.members,.member-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:20px}
.member,.member-card{width:220px;padding:18px;border-radius:18px;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.2);cursor:pointer;transition:.3s}
.member:hover,.member-card:hover{transform:translateY(-8px) scale(1.05);box-shadow:0 0 20px cyan}
.role{margin-top:10px;font-weight:bold}
.member-card:nth-child(odd){background:linear-gradient(135deg,#00c6ff,#0072ff)}
.member-card:nth-child(even){background:linear-gradient(135deg,#ff512f,#dd2476)}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);justify-content:center;align-items:center}
.modal-content{background:#111;padding:25px;border-radius:20px;border:2px solid cyan;max-width:380px;width:90%;position:relative}
.modal-content img{width:180px;height:180px;border-radius:50%;object-fit:cover;border:4px solid cyan}
.close{position:absolute;right:15px;top:10px;font-size:32px;cursor:pointer}
</style>
</head>
<body>
<div class="container">
<h1>⚔ Captains Parekkad ⚔</h1>
<div class="subtitle">Established on 2019</div>

<h2>Leadership</h2>
<div class="members">
<div class="member" onclick="showProfile('Hareesh','Secretary','hareesh.jpg',this)">Hareesh<div class="role"></div></div>
<div class="member" onclick="showRole(this,'Property Owner')">Manesh<div class="role"></div></div>
<div class="member" onclick="showRole(this,'President')">Shiyadh<div class="role"></div></div>
<div class="member" onclick="showRole(this,'Treasurer')">Ajeesh<div class="role"></div></div>
</div>

<h2 style="margin:40px 0 20px">Members</h2>
<div class="member-grid">
<div class="member-card">Ajith</div><div class="member-card">Rashi</div><div class="member-card">Subi</div>
<div class="member-card">Suhaib</div><div class="member-card">Aji</div><div class="member-card">Asif</div>
<div class="member-card">Anoop</div><div class="member-card">Anantha Krishnan</div>
<div class="member-card">Nisam</div><div class="member-card">Sudheesh</div><div class="member-card">Jaseel</div>
</div>
</div>

<div id="profileModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">&times;</span>
<img id="profileImg" src="hareesh.jpg">
<h2 id="profileName">Hareesh</h2>
<h3 id="profileRole">Secretary</h3>
<p>⚔ Captains Parekkad ⚔</p>
</div>
</div>

<script>
const colors=["#00FFFF","#FFD700","#FF69B4","#ADFF2F","#1E90FF"];
function showRole(card,role){
document.querySelectorAll('.role').forEach(r=>{r.innerHTML='';});
let b=card.querySelector('.role');
b.innerHTML='★ '+role+' ★';
b.style.color=colors[Math.floor(Math.random()*colors.length)];
}
function showProfile(name,role,img,card){
showRole(card,role);
document.getElementById('profileName').textContent=name;
document.getElementById('profileRole').textContent=role;
document.getElementById('profileImg').src=img;
document.getElementById('profileModal').style.display='flex';
}
function closeModal(){document.getElementById('profileModal').style.display='none';}
window.onclick=e=>{if(e.target.id==='profileModal')closeModal();}
</script>
</body></html>
